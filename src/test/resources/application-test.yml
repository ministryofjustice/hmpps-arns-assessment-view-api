server:
  shutdown: immediate

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

hmpps-auth:
  url: "http://localhost:8090/auth"

spring:
  datasource:
    hikari:
      # Keep pool size small so multiple cached contexts don't exhaust postgres connections.
      maximum-pool-size: 5
  jpa:
    show-sql: true
    properties:
      hibernate:
        enable_lazy_load_no_trans: true
