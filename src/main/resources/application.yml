info.app:
  name: HMPPS Arns Assessment View Api
  version: 1.0

server:
  port: 8080
  servlet:
    context-path: /
  forward-headers-strategy: native
  tomcat:
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto
      internal-proxies: 10\.\d{1,3}\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3}|169\.254\.\d{1,3}\.\d{1,3}|127\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.1[6-9]{1}\.\d{1,3}\.\d{1,3}|172\.2[0-9]{1}\.\d{1,3}\.\d{1,3}|172\.3[0-1]{1}\.\d{1,3}\.\d{1,3}|0:0:0:0:0:0:0:1|::1|100\.6[4-9]\.\d{1,3}\.\d{1,3}|100\.[7-9][0-9]{1}\.\d{1,3}\.\d{1,3}|100\.1[0-1][0-9]{1}\.\d{1,3}\.\d{1,3}|100\.12[0-7]\.\d{1,3}\.\d{1,3}
  shutdown: graceful

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: 'info, health'
  endpoint:
    health:
      cache:
        time-to-live: 2000ms
      show-components: always
      show-details: always
      probes:
        enabled: true
    info:
      cache:
        time-to-live: 2000ms

spring:
  application:
    name: hmpps-arns-assessment-view-api

  http:
    codecs:
      max-in-memory-size: 10MB

  web:
    error:
      include-message: always

  datasource:
    url: jdbc:postgresql://${DATABASE_ENDPOINT:localhost:5432}/${DATABASE_NAME:postgres}?currentSchema=${DATABASE_SCHEMA_NAME:assessment-view}&stringtype=unspecified
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      connection-timeout: 15000
      leakDetectionThreshold: 20000

  flyway:
    schemas: ${DATABASE_SCHEMA_NAME:assessment-view}
    create-schemas: true
    locations: classpath:/db/migration

  jpa:
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
    show-sql: false

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${HMPPS_AUTH_URL}/.well-known/jwks.json
      client:
        provider:
          hmpps-auth:
            token-uri: ${HMPPS_AUTH_URL}/oauth/token
        registration:
          coordinator-api:
            provider: hmpps-auth
            client-id: ${API_CLIENT_ID}
            client-secret: ${API_CLIENT_SECRET}
            authorization-grant-type: client_credentials
          aap-api:
            provider: hmpps-auth
            client-id: ${API_CLIENT_ID}
            client-secret: ${API_CLIENT_SECRET}
            authorization-grant-type: client_credentials

springdoc:
  swagger-ui:
    version: 5.32.1

app:
  services:
    hmpps-auth:
      base-url: ${HMPPS_AUTH_URL}
    coordinator-api:
      base-url: ${COORDINATOR_API_BASE_URL}
    aap-api:
      base-url: ${AAP_API_BASE_URL}
  sync:
    enabled: ${SYNC_ENABLED:false}
    interval-minutes: ${SYNC_INTERVAL_MINUTES:60}