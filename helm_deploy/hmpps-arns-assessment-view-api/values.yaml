generic-service:
  nameOverride: hmpps-arns-assessment-view-api
  productId: "HMPPS509" # productId for the product that this belongs too, i.e. DPS001, see README.md for details

  replicaCount: 1

  # Sync runs on a scheduler in-process; avoid concurrent pods during rolling deploys
  strategy:
    type: Recreate
    rollingUpdate: null

  image:
    repository: ghcr.io/ministryofjustice/hmpps-arns-assessment-view-api
    tag: app_version # override at deployment time
    port: 8080

  ingress:
    enabled: true
    host: app-hostname.local # override per environment
    tlsSecretName: hmpps-arns-assessment-view-api-cert

  # Environment variables to load into the deployment
  env:
    SERVER_PORT: "8080"
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: applicationinsights.json

  # Pre-existing kubernetes secrets to load as environment variables in the deployment.
  namespace_secrets:
    hmpps-arns-assessment-view-api-application-insights:
      APPLICATIONINSIGHTS_CONNECTION_STRING: "APPLICATIONINSIGHTS_CONNECTION_STRING"

    hmpps-arns-assessment-view-api-client-creds:
      API_CLIENT_ID: "API_CLIENT_ID"
      API_CLIENT_SECRET: "API_CLIENT_SECRET"

    rds-arns-assessment-view-instance-output:
      DATABASE_ENDPOINT: "rds_instance_endpoint"
      DATABASE_NAME: "database_name"
      DATABASE_USERNAME: "database_username"
      DATABASE_PASSWORD: "database_password"

  allowlist:
    groups:
      - internal

generic-prometheus-alerts:
  targetApplication: hmpps-arns-assessment-view-api
