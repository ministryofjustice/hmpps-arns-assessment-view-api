---
# Per environment values which override defaults in hmpps-arns-assessment-view-api/values.yaml

generic-service:
  ingress:
    host: arns-assessment-view-api-dev.hmpps.service.justice.gov.uk

  env:
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: "applicationinsights.dev.json"
    HMPPS_AUTH_URL: "https://sign-in-dev.hmpps.service.justice.gov.uk/auth"
    COORDINATOR_API_BASE_URL: "https://arns-coordinator-api-dev.hmpps.service.justice.gov.uk"
    AAP_API_BASE_URL: "https://arns-assessment-platform-api-dev.hmpps.service.justice.gov.uk"
    SPRINGDOC_API-DOCS_ENABLED: "true"
    SPRINGDOC_SWAGGER-UI_ENABLED: "true"
    SYNC_ENABLED: "true"
    SYNC_INTERVAL_MINUTES: 5

  allowlist:
    legacy-delius-test-az1-nat-gateway: 35.176.126.163/32
    legacy-delius-test-az2-nat-gateway: 35.178.162.73/32
    legacy-delius-test-az3-nat-gateway: 52.56.195.113/32

# CloudPlatform AlertManager receiver to route prometheus alerts to slack
# See https://user-guide.cloud-platform.service.justice.gov.uk/documentation/monitoring-an-app/how-to-create-alarms.html#creating-your-own-custom-alerts
generic-prometheus-alerts:
  alertSeverity: hmpps-arns-non-prod
