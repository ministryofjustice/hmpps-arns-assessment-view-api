---
# Per environment values which override defaults in hmpps-arns-assessment-view-api/values.yaml

generic-service:
  ingress:
    host: arns-assessment-view-api-preprod.hmpps.service.justice.gov.uk

  env:
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: "applicationinsights.dev.json"
    HMPPS_AUTH_URL: "https://sign-in-preprod.hmpps.service.justice.gov.uk/auth"
    COORDINATOR_API_BASE_URL: "https://arns-coordinator-api-preprod.hmpps.service.justice.gov.uk"
    AAP_API_BASE_URL: "https://arns-assessment-platform-api-preprod.hmpps.service.justice.gov.uk"

# CloudPlatform AlertManager receiver to route prometheus alerts to slack
# See https://user-guide.cloud-platform.service.justice.gov.uk/documentation/monitoring-an-app/how-to-create-alarms.html#creating-your-own-custom-alerts
generic-prometheus-alerts:
  alertSeverity: hmpps-arns-non-prod